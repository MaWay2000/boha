<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warzone 2100 Leaderboards</title>
  <meta
    name="description"
    content="Warzone 2100 leaderboard snapshot with top players, live mirror updates, and recent match history."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="icon" href="assets/warzone2100-gamehub-logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="embedded-page">
  <div class="page-shell">
    <main id="top">
      <section class="landing-stats stats-shell section-frame" id="leaderboards">
        <div class="stats-shell-head">
          <div>
            <p class="panel-kicker">Embedded Stats</p>
            <h3>Leaderboard snapshot and match history</h3>
          </div>
          <p class="stats-status" id="resultsStatus" aria-live="polite">Loading mirrored upstream stats...</p>
        </div>

        <div class="stats-toolbar" id="statsLeaderboardButtons"></div>

        <div class="stats-summary" id="statsSummary">
          <article class="stats-card">
            <span class="stats-card-label">Ranked Players</span>
            <strong class="stats-card-value"><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></strong>
          </article>
          <article class="stats-card">
            <span class="stats-card-label">Matches</span>
            <strong class="stats-card-value"><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></strong>
          </article>
          <article class="stats-card">
            <span class="stats-card-label">Top Elo</span>
            <strong class="stats-card-value"><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></strong>
          </article>
          <article class="stats-card">
            <span class="stats-card-label">Latest Match</span>
            <strong class="stats-card-value"><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></strong>
          </article>
        </div>

        <div class="stats-grid">
          <section class="stats-panel">
            <div class="stats-panel-head">
              <div class="stats-panel-copy">
                <p class="panel-kicker">Top Players</p>
                <h4>Current leaderboard slice</h4>
              </div>
              <label class="stats-search-field" for="statsPlayerSearch">
                <span class="visually-hidden">Search top players by nickname or key</span>
                <input
                  id="statsPlayerSearch"
                  class="stats-search-input"
                  type="search"
                  placeholder="Nickname / key"
                  autocomplete="off"
                  spellcheck="false"
                >
              </label>
            </div>

            <div class="stats-table-wrap">
              <table class="stats-table stats-table-ranks">
                <thead>
                  <tr>
                    <th data-sort-table="ranks" data-sort-key="rank" aria-sort="ascending"><button class="stats-sort-button" type="button">Rank</button></th>
                    <th data-sort-table="ranks" data-sort-key="player" aria-sort="none"><button class="stats-sort-button" type="button">Player</button></th>
                    <th data-sort-table="ranks" data-sort-key="elo" aria-sort="none"><button class="stats-sort-button" type="button">Elo</button></th>
                    <th data-sort-table="ranks" data-sort-key="matches" aria-sort="none"><button class="stats-sort-button" type="button">Matches</button></th>
                    <th class="stats-record-sort-head">
                      <div class="stats-record-sort-group" aria-label="Sort by wins, losses, draws, crashes, or percentages">
                        <span class="stats-record-sort-pair">
                          <button class="stats-sort-button stats-sort-button-compact" type="button" data-sort-table="ranks" data-sort-key="wins" aria-label="Sort by wins">W</button>
                          <button class="stats-sort-button stats-sort-button-compact stats-sort-button-percent" type="button" data-sort-table="ranks" data-sort-key="winRate" aria-label="Sort by win percentage (minimum 10 games)">%</button>
                        </span>
                        <span class="stats-record-sort-divider">/</span>
                        <span class="stats-record-sort-pair">
                          <button class="stats-sort-button stats-sort-button-compact" type="button" data-sort-table="ranks" data-sort-key="losses" aria-label="Sort by losses">L</button>
                          <button class="stats-sort-button stats-sort-button-compact stats-sort-button-percent" type="button" data-sort-table="ranks" data-sort-key="lossRate" aria-label="Sort by loss percentage (minimum 10 games)">%</button>
                        </span>
                        <span class="stats-record-sort-divider">/</span>
                        <span class="stats-record-sort-pair">
                          <button class="stats-sort-button stats-sort-button-compact" type="button" data-sort-table="ranks" data-sort-key="draws" aria-label="Sort by draws">D</button>
                          <button class="stats-sort-button stats-sort-button-compact stats-sort-button-percent" type="button" data-sort-table="ranks" data-sort-key="drawRate" aria-label="Sort by draw percentage (minimum 10 games)">%</button>
                        </span>
                        <span class="stats-record-sort-divider">/</span>
                        <span class="stats-record-sort-pair">
                          <button class="stats-sort-button stats-sort-button-compact" type="button" data-sort-table="ranks" data-sort-key="crashes" aria-label="Sort by crashed all-loser games">X</button>
                        </span>
                      </div>
                    </th>
                  </tr>
                </thead>
                <tbody id="statsRanks">
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                  </tr>
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                  </tr>
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                  </tr>
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-medium"></span></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="stats-panel-actions" id="statsRanksActions"></div>
          </section>

          <section class="stats-panel stats-player-games-panel">
            <div class="stats-panel-head">
              <div>
                <p class="panel-kicker">Player Games</p>
                <h4 id="statsPlayerGamesTitle">Expand a player to inspect recent games</h4>
              </div>
              <span class="stats-panel-note" id="statsPlayerGamesMeta">The selected player's latest matches will appear here.</span>
            </div>

            <div class="stats-table-wrap">
              <table class="stats-table">
                <thead>
                  <tr>
                    <th data-sort-table="player-games" data-sort-key="date" aria-sort="descending"><button class="stats-sort-button" type="button">Date</button></th>
                    <th data-sort-table="player-games" data-sort-key="map" aria-sort="none"><button class="stats-sort-button" type="button">Map</button></th>
                    <th data-sort-table="player-games" data-sort-key="result" aria-sort="none"><button class="stats-sort-button" type="button">Result</button></th>
                    <th data-sort-table="player-games" data-sort-key="duration" aria-sort="none"><button class="stats-sort-button" type="button">Duration</button></th>
                    <th data-sort-table="player-games" data-sort-key="replay" aria-sort="none"><button class="stats-sort-button" type="button">Replay</button></th>
                  </tr>
                </thead>
                <tbody id="statsPlayerGames">
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  </tr>
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  </tr>
                  <tr class="stats-skeleton-row" aria-hidden="true">
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                    <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="stats-panel-actions" id="statsPlayerGamesActions"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="embedded-page.js"></script>
  <script type="module" src="stats/live-stats.js"></script>
</body>
</html>
