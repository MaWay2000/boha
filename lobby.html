<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warzone 2100 Lobby</title>
  <meta
    name="description"
    content="Live Warzone 2100 lobby viewer with mirrored online games and map details."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="icon" href="assets/warzone2100-gamehub-logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="embedded-page">
  <div class="page-shell">
    <main id="top">
      <section class="section-grid lobby-page">
        <div class="live-board section-frame" data-reveal>
          <div class="live-board-head">
            <div>
              <p class="panel-kicker">Streaming Lobby View</p>
              <h3 id="lobbyCaption">Connecting to lobby feed...</h3>
            </div>
            <div class="live-board-meta">
              <p class="live-board-updated" id="lobbyUpdated" aria-live="polite"></p>
              <span class="stream-badge" id="lobbyBadge">Offline</span>
            </div>
          </div>

          <div class="table-shell">
            <table class="lobby-table">
              <thead>
                <tr>
                  <th data-sort-table="lobby" data-sort-key="host" aria-sort="none"><button class="stats-sort-button" type="button">Host</button></th>
                  <th data-sort-table="lobby" data-sort-key="players" aria-sort="descending"><button class="stats-sort-button" type="button">Players</button></th>
                  <th data-sort-table="lobby" data-sort-key="spectators" aria-sort="none"><button class="stats-sort-button" type="button">Spectators</button></th>
                  <th data-sort-table="lobby" data-sort-key="status" aria-sort="none"><button class="stats-sort-button" type="button">Status</button></th>
                  <th data-sort-table="lobby" data-sort-key="map" aria-sort="none"><button class="stats-sort-button" type="button">Map</button></th>
                  <th data-sort-table="lobby" data-sort-key="title" aria-sort="none"><button class="stats-sort-button" type="button">Title</button></th>
                </tr>
              </thead>
              <tbody id="lobbyGames">
                <tr class="lobby-skeleton-row" aria-hidden="true">
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                </tr>
                <tr class="lobby-skeleton-row" aria-hidden="true">
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                </tr>
                <tr class="lobby-skeleton-row" aria-hidden="true">
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                </tr>
                <tr class="lobby-skeleton-row" aria-hidden="true">
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line stats-skeleton-short"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  <td><span class="stats-skeleton stats-skeleton-line"></span></td>
                  </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="embedded-page.js"></script>
  <script src="app.js"></script>
</body>
</html>
