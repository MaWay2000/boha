<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warzone 2100 Game Hub</title>
  <meta
    name="description"
    content="A remade Warzone 2100 webstats viewer with leaderboard snapshots, recent matches, open data access, and the Warzone Radio player."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="icon" href="assets/warzone2100-gamehub-logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="page-noise" aria-hidden="true"></div>

    <div class="masthead-band">
      <header class="topbar">
        <a class="brand" href="leaderboards.html" target="contentFrame" data-tab="leaderboards" aria-label="Warzone 2100 Game Hub">
          <img src="assets/warzone2100-gamehub-logo.png" alt="Warzone 2100 logo">
        </a>

        <nav class="topnav" aria-label="Primary">
          <a href="leaderboards.html" target="contentFrame" data-tab="leaderboards" aria-current="page">Leaderboards</a>
          <a href="recent-matches.html" target="contentFrame" data-tab="recent-matches">Recent Matches</a>
          <a href="open-data.html" target="contentFrame" data-tab="open-data">Open Data</a>
        </nav>

        <a class="discord-link" href="https://discord.gg/9wbtUkGMgf" target="_blank" rel="noreferrer">
          Discord Server
        </a>

        <div class="topbar-radio" aria-label="Warzone Radio">
          <iframe
            src="https://maway2000.github.io/warzone2100-radio/"
            title="Warzone Radio"
            loading="eager"
          ></iframe>
        </div>
      </header>
    </div>

    <main class="frame-shell-main" id="top">
      <iframe
        class="content-frame"
        id="contentFrame"
        name="contentFrame"
        title="Warzone 2100 content"
        src="leaderboards.html"
        loading="eager"
      ></iframe>
    </main>

    <footer class="site-footer">
      <p><a href="https://mit-license.org/" target="_blank" rel="noreferrer">MIT License</a>. Warzone 2100 - webstats viewer by Maway2000</p>
    </footer>
  </div>

  <script src="shell-frame.js"></script>
</body>
</html>
