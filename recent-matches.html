<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warzone 2100 Recent Matches</title>
  <meta
    name="description"
    content="Recent Warzone 2100 matches with replay links, live mirror updates, and leaderboard slice filters."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="icon" href="assets/warzone2100-gamehub-logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="embedded-page">
  <div class="page-shell">
    <main id="top">
      <section class="landing-stats stats-shell section-frame">
        <div class="stats-shell-head">
          <div>
            <p class="panel-kicker">Recent Matches</p>
            <h3>Replay-ready match list by leaderboard slice</h3>
          </div>
          <p class="stats-status" id="resultsStatus" aria-live="polite">Loading mirrored upstream stats...</p>
        </div>

        <div class="stats-toolbar" id="statsLeaderboardButtons"></div>

        <section class="stats-panel">
          <div class="stats-panel-head">
            <div>
              <p class="panel-kicker">Recent Matches</p>
              <h4>Latest games in the selected slice</h4>
            </div>
            <label class="stats-search-field" for="statsMatchesSearch">
              <span class="visually-hidden">Search recent matches by nickname, key, or map</span>
              <input
                id="statsMatchesSearch"
                class="stats-search-input"
                type="search"
                placeholder="Nickname / map"
                autocomplete="off"
                spellcheck="false"
              >
            </label>
          </div>

          <div class="stats-table-wrap">
            <table class="stats-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Map</th>
                  <th>Players</th>
                  <th>Duration</th>
                  <th>Replay</th>
                </tr>
              </thead>
              <tbody id="statsMatches" data-match-limit="60">
                <tr class="stats-empty-row">
                  <td colspan="5">Waiting for match history.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="embedded-page.js"></script>
  <script type="module" src="stats/live-stats.js"></script>
</body>
</html>
